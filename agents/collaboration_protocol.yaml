collaboration_protocol:
  communication_channels:
    - daily_standup: "9:00 AM UTC - 15 minutes"
    - technical_design_review: "Weekly, Wednesday 2:00 PM UTC"
    - stakeholder_demo: "Bi-weekly, Friday 10:00 AM UTC"
    - risk_review: "Weekly, Monday 4:00 PM UTC"
  
  decision_making_hierarchy:
    architectural_decisions:
      approvers: [backend_agent, database_agent, financial_domain_agent]
      escalation: project_coordinator_agent
    
    ui_ux_decisions:
      approvers: [frontend_agent, financial_domain_agent]
      escalation: project_coordinator_agent
    
    quality_decisions:
      approvers: [qa_agent, financial_domain_agent]
      escalation: project_coordinator_agent
    
    deployment_decisions:
      approvers: [devops_agent, qa_agent]
      escalation: project_coordinator_agent
  
  integration_checkpoints:
    phase1_completion: "Database schema & API endpoints"
      validators: [database_agent, backend_agent, qa_agent]
    
    phase2_completion: "Frontend components & integration"
      validators: [frontend_agent, backend_agent, qa_agent]
    
    phase3_completion: "End-to-end testing & performance validation"
      validators: [qa_agent, devops_agent, financial_domain_agent]
    
    phase4_completion: "Production deployment & user acceptance"
      validators: [all_agents]
  
  escalation_paths:
    technical_blockers: "Project coordinator → Relevant technical leads"
    scope_changes: "Project coordinator → Stakeholders"
    resource_constraints: "Project coordinator → Executive sponsors"
    quality_issues: "QA agent → Technical leads → Project coordinator"