# Jicofo configuration for local Jitsi server

# Authentication settings for Jicofo
org.jitsi.jicofo.auth.URL=EXT_JWT:jitsi-meet.example.com

# XMPP domain settings
org.jitsi.jicofo.XMPP_DOMAIN=meet.jitsi
org.jitsi.jicofo.FOCUS_USER_NAME=focus

# Authentication password for focus user (should match .env)
org.jitsi.jicofo.auth.PASSWORD=focus1234567890

# XMPP server settings
org.jitsi.jicofo.XMPP_SERVER=meet.jitsi
org.jitsi.jicofo.XMPP_PORT=5269
org.jitsi.jicofo.XMPP_CONNECTION_MODE=DISABLE_SECURITY

# MUC settings
org.jitsi.jicofo.MUC_JIDS=JvbBrewery@internal-muc.meet.jitsi,Focus@internal-muc.meet.jitsi
org.jitsi.jicofo.MUC_NICKNAME=7a958c1d-5762-40d3-9b29-64a1a7e14e26

# MUC domain settings
org.jitsi.jicofo.BRIDGE_MUC_NAME=JvbBrewery@internal-muc.meet.jitsi

# Authentication type
org.jitsi.jicofo.AUTOMODERATE_ENABLE=false

# Enable health checks
org.jitsi.jicofo.HEALTH_CHECK_INTERVAL_MS=10000

# Disable lobby
org.jitsi.jicofo.ALWAYS_TRUST_MODE_ENABLED=true

# Disable authentication requirements
org.jitsi.jicofo.ALLOWED_FOCUS_JIDS=focus.meet.jitsi