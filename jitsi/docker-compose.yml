version: '3.8'

services:
  # Frontend
  web:
    image: jitsi/web:stable
    restart: ${RESTART_POLICY}
    ports:
      - '${HTTP_PORT}:80'
      - '${HTTPS_PORT}:443'
    volumes:
      - ${CONFIG}/web:/config:Z
      - ${CONFIG}/web/crontabs:/var/spool/cron/crontabs:Z
      - ${CONFIG}/transcripts:/usr/share/jitsi-meet/transcripts:Z
    environment:
      - ENABLE_LETSENCRYPT
      - ENABLE_HTTP_REDIRECT
      - JVB_BREWERY_MUC
      - JVB_ROOM_NAME
      - JVB_ENABLE_AUDIO_LEVELS
      - JVB_AUDIO_LEVELS_INTERVAL
      - JVB_AUDIO_LEVELS_THRESHOLD
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_BOSH_URL_BASE
      - XMPP_MUC_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MUC_SUBDOMAIN
      - XMPP_RECORDER_DOMAIN
      - JIBRI_BREWERY_MUC
      - JIBRI_PENDING_TIMEOUT
      - JIBRI_XMPP_USER
      - JIBRI_XMPP_PASSWORD
      - JIBRI_RECORDER_USER
      - JIBRI_RECORDER_PASSWORD
      - JIBRI_LOGS_DIR
      - JITSI_MEET_CONFIG_FILE
      - JVB_ENABLE_RECORDING
      - TZ
      - ENABLE_COLIBRI_WEBSOCKET
    networks:
      meet.jitsi:
        aliases:
          - ${XMPP_SERVER_SUBDOMAIN}.${XMPP_DOMAIN}
          - ${XMPP_INTERNAL_MUC_SUBDOMAIN}.${XMPP_DOMAIN}
    depends_on:
      - prosody
      - jicofo
      - jvb

  # XMPP server
  prosody:
    image: jitsi/prosody:stable
    restart: ${RESTART_POLICY}
    expose:
      - '5222'
      - '5347'
      - '5269'
    volumes:
      - ${CONFIG}/prosody:/config:Z
    environment:
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MUC_SUBDOMAIN
      - XMPP_INTERNAL_MUC_MODULES
      - XMPP_RECORDER_DOMAIN
      - XMPP_CROSS_DOMAIN
      - GLOBAL_MODULES
      - GLOBAL_CONFIG
      - AUTH_TYPE
      - LDAP_URL
      - LDAP_BASE
      - LDAP_BINDDN
      - LDAP_BINDPW
      - LDAP_FILTER
      - LDAP_ADMINS
      - LDAP_USERS
      - LDAP_AUTH_METHOD
      - LDAP_VERSION
      - LDAP_USE_TLS
      - LDAP_TLS_CIPHERS
      - LDAP_TLS_CHECK_PEER
      - LDAP_TLS_CACERT_FILE
      - LDAP_TLS_CACERT_DIR
      - LDAP_DEREF
      - ENABLE_LOBBY
      - ENABLE_AV_MODERATION
      - JIBRI_BREWERY_MUC
      - JIBRI_PENDING_TIMEOUT
      - JICOFO_AUTH_USER
      - JICOFO_AUTH_PASSWORD
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - JDVB_AUTH_USER
      - JDVB_AUTH_PASSWORD
      - JIGASI_XMPP_USER
      - JIGASI_XMPP_PASSWORD
      - JIBRI_XMPP_USER
      - JIBRI_XMPP_PASSWORD
      - JIBRI_RECORDER_USER
      - JIBRI_RECORDER_PASSWORD
      - JVB_BREWERY_MUC
      - JVB_INTERNAL_MUC
      - TZ
    networks:
      meet.jitsi:
        aliases:
          - ${XMPP_DOMAIN}

  # Focus component
  jicofo:
    image: jitsi/jicofo:stable
    restart: ${RESTART_POLICY}
    volumes:
      - ${CONFIG}/jicofo:/config:Z
    environment:
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_BOSH_URL_BASE
      - XMPP_FOCUSED_USER JICOFO_RESERVATION_REST_ENABLED
      - JICOFO_ENABLE_HEALTH_CHECKS
      - JIBRI_BREWERY_MUC
      - JIBRI_PENDING_TIMEOUT
      - JICOFO_AUTH_USER
      - JICOFO_AUTH_PASSWORD
      - JVB_BREWERY_MUC
      - JIGASI_XMPP_USER
      - JIGASI_XMPP_PASSWORD
      - JIGASI_BREWERY_MUC
      - JIGASI_SIP_URI
      - ENABLE_RECORDING
      - TZ
    depends_on:
      - prosody
    networks:
      meet.jitsi:
        aliases:
          - jicofo.${XMPP_DOMAIN}

  # Video bridge
  jvb:
    image: jitsi/jvb:stable
    restart: ${RESTART_POLICY}
    ports:
      - '${JVB_PORT}:${JVB_PORT}/udp'
      - '${JVB_TCP_PORT}:${JVB_TCP_PORT}'
    volumes:
      - ${CONFIG}/jvb:/config:Z
    environment:
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - JVB_BREWERY_MUC
      - JVB_PORT
      - JVB_TCP_PORT
      - JVB_TCP_MAPPED_PORT
      - JVB_STUN_SERVERS
      - JVB_ENABLE_UDP_STUN
      - JVB_ENABLE_TCP_HARVESTER
      - JVB_WS_DOMAIN
      - JVB_WS_SERVER_ID
      - JVB_ENABLE_RECORDING
      - TZ
      - DOCKER_HOST_ADDRESS
    depends_on:
      - prosody
    networks:
      meet.jitsi:
        aliases:
          - jvb.${XMPP_DOMAIN}

networks:
  meet.jitsi:
    driver: bridge